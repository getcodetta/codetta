name: Release

# Triggered when you push a tag like v0.1.0, v0.2.0, etc.
# Builds Codetta for Windows, macOS, and Linux in parallel and creates a
# draft GitHub Release with all installers attached. You review, edit
# release notes, then click Publish.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      # Don't cancel siblings if one platform fails — we still want the
      # other artifacts so we can ship a partial release if needed.
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            label: windows
            # Tauri picks NSIS + MSI from tauri.conf.json bundle.targets
            args: ""
          - platform: macos-latest
            label: macos
            # Universal binary (Apple Silicon + Intel) so one .dmg covers both.
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            label: linux
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS universal build needs both targets.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust target dir
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.label }}

      # Linux needs WebKit and a few system libs that Tauri links against.
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code-signing + notarization is intentionally OFF for
          # now. The cert in the APPLE_CERTIFICATE secret has been
          # failing PKCS12 import (.p12 password mismatch / OpenSSL 3
          # legacy-mode export issue) on every release since v0.2.0,
          # which made macOS bundling fail and the whole release run
          # show "failure" even though Windows + Linux artifacts
          # uploaded fine. With these env vars unset, tauri-action
          # builds an unsigned .dmg / .app — Gatekeeper will warn on
          # first launch ("right-click → Open" workaround), same UX as
          # v0.2.0 / v0.3.0 already had since they shipped without a
          # macOS asset at all. Re-enable by uncommenting + re-setting
          # the secrets once the cert is regenerated.
          #
          #   APPLE_CERTIFICATE             = base64-encoded .p12 of
          #     the Developer ID Application cert
          #   APPLE_CERTIFICATE_PASSWORD    = the .p12 export password
          #   APPLE_SIGNING_IDENTITY        = "Developer ID Application: Name (TEAMID)"
          #   APPLE_ID                      = your Apple ID email
          #   APPLE_PASSWORD                = app-specific password from
          #     account.apple.com (NOT your real password)
          #   APPLE_TEAM_ID                 = 10-char alphanumeric team id
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Codetta ${{ github.ref_name }}"
          releaseBody: |
            ### Codetta ${{ github.ref_name }}

            Download the installer for your OS below.

            | OS | File | Notes |
            |---|---|---|
            | **Windows** | `Codetta_<ver>_x64-setup.exe` | NSIS — recommended |
            | **Windows** | `Codetta_<ver>_x64_en-US.msi` | Enterprise MSI |
            | **macOS** | `Codetta_<ver>_universal.dmg` | Apple Silicon + Intel, **unsigned** — first launch needs `System Settings → Privacy & Security → Open Anyway` |
            | **Linux** | `codetta_<ver>_amd64.AppImage` | Portable, single file |
            | **Linux** | `codetta_<ver>_amd64.deb` | Debian / Ubuntu |

            See the [README](https://github.com/getcodetta/codetta#install-end-users)
            for first-run setup and AI provider configuration.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
